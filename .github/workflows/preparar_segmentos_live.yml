name: 🎬 Preparar Segmentos de Vídeo para Live (ES)

on:
  workflow_dispatch:

jobs:
  processar_videos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Instalar FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Instalar bibliotecas Python para Drive
        run: pip install google-api-python-client google-auth

      - name: Baixar vídeos do Drive, remover áudio e segmentar
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          mkdir -p segmentos brutos
          python3 << 'PYEOF'
          import os, json, glob, subprocess
          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build

          PASTA_BRUTOS = "1eUw8mCbH_eIi-nqQ2Qk8BqFfp0fC2pIi"

          creds = Credentials.from_service_account_info(
              json.loads(os.environ["GOOGLE_CREDENTIALS"]),
              scopes=["https://www.googleapis.com/auth/drive"]
          )
          drive = build("drive", "v3", credentials=creds)

          # Lista vídeos na pasta
          res = drive.files().list(
              q=f"'{PASTA_BRUTOS}' in parents and trashed=false and mimeType contains 'video/'",
              fields="files(id, name)"
          ).execute()
          arquivos = res.get("files", [])
          print(f"📁 {len(arquivos)} vídeo(s) encontrado(s) na pasta do Drive")

          for i, arq in enumerate(arquivos):
              destino = f"brutos/video_{i+1}.mp4"
              print(f"⬇️  Baixando [{i+1}/{len(arquivos)}] {arq['name']}...")
              request = drive.files().get_media(fileId=arq["id"])
              with open(destino, "wb") as f:
                  f.write(request.execute())
              print(f"   ✅ Baixado: {os.path.getsize(destino)/1024/1024:.1f} MB")

              print(f"✂️  Removendo áudio e segmentando em blocos de 10 min...")
              subprocess.run([
                  "ffmpeg", "-y", "-i", destino,
                  "-an", "-c:v", "copy",
                  "-f", "segment", "-segment_time", "600", "-reset_timestamps", "1",
                  f"segmentos/live_ES_v{i+1}_%03d.mp4"
              ], capture_output=True)
              os.remove(destino)
              print(f"   ✅ Vídeo {i+1} segmentado")

          segs = glob.glob("segmentos/*.mp4")
          print(f"\n📊 Total de segmentos gerados: {len(segs)}")
          PYEOF

      - name: Listar segmentos gerados
        run: |
          echo "📊 Segmentos prontos para download:"
          ls -lh segmentos/
          echo "Total: $(ls segmentos/*.mp4 | wc -l) arquivos"

      - name: Salvar segmentos como Artifact (download via GitHub UI)
        uses: actions/upload-artifact@v7
        with:
          name: live-ES-segmentos-base
          path: segmentos/
          retention-days: 90
