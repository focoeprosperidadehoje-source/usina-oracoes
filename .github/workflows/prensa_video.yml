name: 2. Prensa Longos (Matrix ES)

on:
  schedule:
    - cron: '0 12 * * *' # 09:00 BRT
    - cron: '0 18 * * *' # 15:00 BRT
  workflow_dispatch: 

jobs:
  renderizar_e_publicar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    timeout-minutes: 45
    strategy:
      matrix:
        horario: ['06:00', '18:00'] # Apenas a nova grade de longos
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3'
      - run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
          wget -q -O Anton.ttf https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf
      - run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 Pillow gspread pytz edge-tts
      - env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          YOUTUBE_TOKEN_ES: ${{ secrets.YOUTUBE_TOKEN_ES }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador.py
