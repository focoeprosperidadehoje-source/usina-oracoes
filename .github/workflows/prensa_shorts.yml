name: Prensa de Shorts (Matrix ES)

on:
  schedule:
    - cron: '0 10 * * *' # 07:00 BRT (Prepara o Short das 08:00)
    - cron: '0 15 * * *' # 12:00 BRT (Prepara o Short das 13:00)
    - cron: '0 21 * * *' # 18:00 BRT (Prepara o Short das 19:00)
    - cron: '0 0 * * *'  # 21:00 BRT (Prepara o Short das 22:00)
  workflow_dispatch: 

jobs:
  renderizar_shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # 🛡️ TRAVA ANTI-ZUMBI
    strategy:
      matrix:
        horario: ['08:00', '13:00', '19:00', '22:00']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
          
      - name: Instalar FFmpeg
        run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
          
      - name: Instalar Bibliotecas Python
        run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 gspread pytz edge-tts
        
      - name: Rodar Publicador de Shorts
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          YOUTUBE_TOKEN_ES_SHORTS: ${{ secrets.YOUTUBE_TOKEN_ES_SHORTS }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador_shorts.py
