name: 2. Prensa Shorts (Matrix ES)

on:
  schedule:
    - cron: '0 13 * * *' # 10:00 BRT
    - cron: '0 19 * * *' # 16:00 BRT
  workflow_dispatch: 

jobs:
  renderizar_shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        horario: ['14:00'] # Apenas a nova grade de Shorts
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
          wget -q -O Anton.ttf https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf
      - run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 Pillow gspread pytz edge-tts
      - env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          YOUTUBE_TOKEN_ES_SHORTS: ${{ secrets.YOUTUBE_TOKEN_ES_SHORTS }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador_shorts.py
