name: Usina Automática Diária

# O Despertador: Roda todo dia às 05:23 UTC (02:23 da manhã no Brasil)
on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch: 

jobs:
  produzir_videos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando o código da Usina
        uses: actions/checkout@v4

      - name: Preparando o Python (O Motor)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalando as Ferramentas
        run: |
          pip install google-genai gspread

      - name: Ligando a Usina (Rodando o Script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python usina.py
