name: Usina Automática Diária

# O Despertador: Roda todo dia às 06:00 UTC (03:00 da manhã no Brasil)
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite rodar manualmente clicando num botão

jobs:
  produzir_videos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando o código da Usina
        uses: actions/checkout@v3

      - name: Preparando o Python (O Motor)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalando as Ferramentas
        run: |
          pip install google-genai gspread

      - name: Ligando a Usina (Rodando o Script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python usina.py
