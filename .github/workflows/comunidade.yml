name: 3. Comunidade e Vendas (ES)

on:
  schedule:
    - cron: '0 14 * * *' # 11:00 BRT
    - cron: '0 2 * * *'  # 23:00 BRT
  workflow_dispatch: 

jobs:
  interagir:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3'
      - run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 gspread google-genai
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          YOUTUBE_TOKEN_ES: ${{ secrets.YOUTUBE_TOKEN_ES }}
        run: python comunidade.py
